traces_backend: "mlflow"
traces_project: "dspy-sft-longbench-qwen4b"

lm:
  model: "openai/Qwen3.5-4B.Q8_0.gguf"
  api_base: "http://192.168.1.91:8080/v1"
  api_key: "dummy"
  max_tokens: 32000
  timeout: 60
dataset:
  path: "longbench_pro_en.parquet"
  label_field: "answer"
  prompt_template:
    context: "{context}"
    query: "{question_nonthinking}"

module:
  type: "CustomizableRLM"
  signature: "context, query -> answer"
  kwargs: {}

collection:
  num_threads: 1
  metric: "always_true"
  output_dir: "./local_sft_data"
