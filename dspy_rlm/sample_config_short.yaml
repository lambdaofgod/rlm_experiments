traces_endpoint: "http://localhost:6006/v1/traces"
traces_project: "dspy-sft-longbench-sample-short-397B"

lm:
  model: "openrouter/qwen/qwen3.5-397B-A17B"
  max_tokens: 65536
dataset:
  path: "longbench_pro_en.parquet"
  label_field: "answer"
  prompt_template:
    context: "{context}"
    query: "{question_thinking}"
  token_lengths: ["8k", "16k", "32k"]

module:
  type: "CustomizableRLM"
  signature: "context, query -> answer"
  kwargs: {}

collection:
  num_threads: 1
  metric: "always_true"
  output_dir: "./sample_sft_data"
